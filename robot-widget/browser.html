<!DOCTYPE html>
<html>

<head>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #0a0a0f;
        }

        #browser-header {
            height: 40px;
            background: rgba(15, 15, 25, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            display: flex;
            align-items: center;
            padding: 0 15px;
            color: #0ff;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        #status-dot {
            width: 8px;
            height: 8px;
            background: #0ff;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px #0ff;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
                transform: scale(1.1);
            }

            100% {
                opacity: 0.6;
            }
        }

        #browser-container {
            height: calc(100% - 40px);
            width: 100%;
        }

        webview {
            width: 100%;
            height: 100%;
            background: #fff;
        }

        #url-display {
            opacity: 0.6;
            font-size: 11px;
            margin-left: auto;
        }
    </style>
</head>

<body>
    <div id="browser-header">
        <div id="status-dot"></div>
        NOVA BROWSER AGENT
        <div id="url-display" id="current-url">Loading...</div>
    </div>
    <div id="browser-container">
        <webview id="main-webview" src="about:blank" allowpopups></webview>
    </div>

    <script>
        const webview = document.getElementById('main-webview');
        const urlDisplay = document.getElementById('url-display');
        const { ipcRenderer } = require('electron');

        webview.addEventListener('did-start-loading', () => {
            urlDisplay.innerText = "Loading...";
        });

        webview.addEventListener('did-stop-loading', () => {
            urlDisplay.innerText = webview.getURL();
        });

        // ── NAVIGATION ───────────────────────────────────────────────────────
        ipcRenderer.on('navigate', (event, url) => {
            console.log('🌐 Browser: Navigating to', url);
            webview.src = url;
        });

        // ── SCROLLING ────────────────────────────────────────────────────────
        ipcRenderer.on('scroll', (event, direction) => {
            const amount = direction === 'down' ? 500 : -500;
            console.log('📜 Browser: Scrolling', direction);
            webview.executeJavaScript(`window.scrollBy({ top: ${amount}, behavior: 'smooth' })`).catch(console.error);
        });

        // ── DOM MAPPING (Smart Click) ────────────────────────────────────────
        ipcRenderer.on('get-dom-map', (event) => {
            console.log('🧠 Browser: Generating DOM Map...');
            webview.executeJavaScript(`
                (function() {
                    const elements = Array.from(document.querySelectorAll('button, a, input, [role="button"], [onclick], h3, .ytp-ad-skip-button, ytd-thumbnail, ytd-video-renderer, img'));
                    return elements
                        .filter(el => {
                            const rect = el.getBoundingClientRect();
                            if (rect.width <= 1 || rect.height <= 1) return false;
                            const style = window.getComputedStyle(el);
                            if (style.visibility === 'hidden' || style.display === 'none' || style.opacity === '0') return false;
                            return true;
                        })
                        .map((el, index) => {
                            el.setAttribute('nova-id', index);
                            return {
                                id: index,
                                tag: el.tagName,
                                text: (el.innerText || el.ariaLabel || el.placeholder || el.title || "").trim().substring(0, 80),
                                type: el.type || el.getAttribute('role') || ""
                            };
                        });
                })()
            `).then(map => {
                ipcRenderer.send('dom-map-results', map);
            }).catch(err => {
                console.error('❌ DOM Map Error:', err);
                ipcRenderer.send('dom-map-results', []);
            });
        });

        // ── CLICKING ─────────────────────────────────────────────────────────
        ipcRenderer.on('click-by-id', (event, id) => {
            console.log('🖱️ Browser: Clicking by ID', id);
            webview.executeJavaScript(`
                (function() {
                    const el = document.querySelector('[nova-id="${id}"]');
                    if (el) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        
                        // Visual ripple
                        const rect = el.getBoundingClientRect();
                        const x = rect.left + rect.width / 2;
                        const y = rect.top + rect.height / 2;
                        const ripple = document.createElement('div');
                        ripple.style.cssText = 'position:fixed; z-index:999999; border: 4px solid #0ff; border-radius:50%; pointer-events:none; width:60px; height:60px; left:'+(x-30)+'px; top:'+(y-30)+'px; transition: all 0.4s; opacity:1; transform:scale(0.3);';
                        document.body.appendChild(ripple);
                        
                        setTimeout(() => { 
                            ripple.style.transform = 'scale(1.5)'; 
                            ripple.style.opacity = '0'; 
                        }, 10);
                        
                        setTimeout(() => { 
                            ripple.remove(); 
                            // Try multiple click methods for robustness
                            el.focus();
                            el.click();
                            
                            // Fallback for elements that need pointer events
                            const mouseEvent = new MouseEvent('click', {
                                view: window,
                                bubbles: true,
                                cancelable: true
                            });
                            el.dispatchEvent(mouseEvent);
                        }, 400);
                        return true;
                    }
                    return false;
                })()
            `).catch(console.error);
        });

        ipcRenderer.on('smart-click', (event, targetText) => {
            console.log('🖱️ Browser: Smart clicking for', targetText);
            const escapedText = JSON.stringify(targetText);
            webview.executeJavaScript(`
                (function() {
                    const lowerText = ${escapedText}.toLowerCase().trim();
                    // Include more tags for search on complex sites
                    const elements = Array.from(document.querySelectorAll('button, a, input, [role="button"], [onclick], h3, .ytp-ad-skip-button, ytd-thumbnail, ytd-video-renderer, ytd-grid-video-renderer, span, div, img'));
                    
                    const match = elements.find(el => {
                        const t = (el.innerText || el.title || el.ariaLabel || el.alt || "").toLowerCase().trim();
                        // Priority 1: Exact match
                        if (t === lowerText) return true;
                        // Priority 2: Title contains target and is short (likely a button/link)
                        if (t.includes(lowerText) && t.length < 100) return true;
                        return false;
                    });

                    if (match) {
                        // Click the element or its nearest interactive parent
                        const clickTarget = match.closest('a, button, [role="button"]') || match;
                        console.log('🎯 Smart-Click Match Found:', clickTarget.tagName);
                        
                        // Flash the element briefly
                        const oldOutline = clickTarget.style.outline;
                        clickTarget.style.outline = '3px solid #0ff';
                        setTimeout(() => clickTarget.style.outline = oldOutline, 500);

                        clickTarget.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        
                        // Execute click with longer delay for scroll settling
                        setTimeout(() => {
                            clickTarget.click();
                            // Fallback Dispatch
                            const evt = new MouseEvent('click', { bubbles: true, cancelable: true, view: window });
                            clickTarget.dispatchEvent(evt);
                        }, 500);
                        return true;
                    }
                    return false;
                })()
            `).catch(console.error);
        });
    </script>
</body>

</html>
